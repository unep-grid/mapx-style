name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify jsDelivr bundles are committed
        run: |
          set -euo pipefail
          for f in \
            packages/theme-core/dist/mapx-style.umd.js \
            packages/theme-core/dist/mapx-style.esm.js
          do
            if ! git cat-file -e "HEAD:${f}" 2>/dev/null; then
              echo "::error file=${f}::Missing from git at this tag. Run 'npm run release' (uses release-it) — it builds and commits dist automatically before tagging."
              exit 1
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@unep-grid"

      - run: npm ci
      - run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Build library
        run: npm run build:lib
        working-directory: packages/theme-core

      - name: Publish
        run: npm publish
        working-directory: packages/theme-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
